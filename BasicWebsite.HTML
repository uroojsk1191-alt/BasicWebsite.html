<!DOCTYPE html>
<html lang="eng">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>Basic HTML and CSS</title>

        <style>

            body {
                font-family: Arial, sans-serif;
                background-color: #f3f6f9;
                margin: 20px;
                color: #333;
            }

            h1 {
                color: #007bff;
                border-bottom: 2px solid #007bff;
                padding-bottom: 10px;
            }

            p {
                font-size: 16px ;
                line-height: 1.5;
            }

            .button {
                background-color: #007bff;
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 5px;
                cursor: pointer;
            }

            .button:hover {
                background-color: #0056b3;
            }

        </style>
    </head>
    <body>

        <h1>Welcome to my Website</h1>
        <p>This is a basic HTML paragraph with some CSS styling applied.</p>
        <button>Learn More</button>

    </body>
</html>
